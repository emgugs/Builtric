name: Build and release preview
permissions:
  contents: write

on:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    timeout-minutes: 6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: Update unframer to latest
        run: bun update unframer
      - run: bun install
      - id: framer
        run: bun run framer
        continue-on-error: true
      - id: build
        run: bun run build
        continue-on-error: true
      - id: deploy
        run: bunx unframer-deploy-demo@latest --secret 46e63515e156405e --slug builtric-d9b75 --dir ./dist
        continue-on-error: true
      - name: Commit & push (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git pull --rebase origin "${{ github.ref_name }}" || true
          git commit -m "chore: automated update [skip ci]"
          git push origin HEAD:"${{ github.ref_name }}" || true
      - name: Verify build succeeds
        if: ${{ (steps.framer.outcome == 'failure' || steps.build.outcome == 'failure' || steps.deploy.outcome == 'failure') && !cancelled() }}
        run: |
          bun update unframer
          bun run framer
          bun run build